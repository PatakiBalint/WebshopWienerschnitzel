<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <button onclick="getMyPosts()">GetData</button>
  <button onclick="addPost()">SendData</button>
  <button onclick="deletePost()">Del</button>
  <button onclick="putPost()">Put</button>
  <hr>

  <div class="posts-div"></div>
  <script>

    function getLocalData(){
      const data = JSON.parse(localStorage.getItem('posts')) || [];
      render(data);
    }
    getLocalData();

    async function getMyPosts() {
      // Figyeld az URL-t! A saját géped címe:
      const response = await fetch('http://localhost:3000/posts');
      const data = await response.json();
      console.log(data);
      localStorage.setItem('posts', JSON.stringify(data));
      render(data);
    }

    function render(data){
      const container = document.querySelector('.posts-div');
      container.innerHTML = '';
      html= '';
      data.forEach(post => {
        html += `
          <div class="post-card">
            <h3>${post.title} <small>(ID: ${post.id})</small></h3>
            <p>Szerző: ${post.author}</p>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    async function addPost() {
      const newPost = {
        title: "Újra",
        author: "Én"
        // ID-t nem kell megadni, a json-server automatikusan generálja!
      };

      await fetch('http://localhost:3000/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newPost)
      });
      
      console.log("Nézd meg a db.json fájlt, benne lesz!");
      getMyPosts();
    }

    async function deletePost(){
      await fetch(`http://localhost:3000/posts/5348`,
        {
          method: 'DELETE'
        });
      getMyPosts()
    }


    async function putPost(){
      const data = {
        title: 'módosítva',
        author: 'Én'
      }

      await fetch('http://localhost:3000/posts/f1ea', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });

      getMyPosts();
    }


  </script>
</body>
</html>
